modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
loggFile = "logo.png"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies.${ mod_id }]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "ae2"
mandatory = true
versionRange = "[15.4.10,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "guideme"
mandatory = false
versionRange = "[20.1.0,)"
ordering = "AFTER"
side = "BOTH"
